name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: make fmt-check check lint test
      - name: Test release package verification
        run: python3 -m unittest scripts/test_verify_release_package.py

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --locked

  e2e:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make e2e

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: make coverage

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check all targets with Cargo.lock
        run: cargo check --all-targets --locked
      - name: Run unit and integration tests
        run: cargo test --all-targets --locked
      - name: Build the release binary
        run: cargo build --release --locked
      - name: Package the Windows release
        shell: pwsh
        run: ./scripts/build-release.ps1
      - name: Verify the Windows package
        run: python scripts/verify-release-package.py "dist/*.zip" --binary lattelens.exe
      - uses: actions/upload-artifact@v7
        with:
          name: lattelens-Windows-${{ runner.arch }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  package:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make package-smoke
      - uses: actions/upload-artifact@v7
        with:
          name: lattelens-${{ runner.os }}-${{ runner.arch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
