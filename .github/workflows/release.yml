name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  package-unix:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: latte-lens-linux-x86_64
            run_full_quality_gate: true
            run_native_e2e: false
            install_musl: true
            install_cross_musl: false
            linker: musl-gcc
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            artifact_name: latte-lens-linux-aarch64
            run_full_quality_gate: false
            run_native_e2e: false
            install_musl: false
            install_cross_musl: true
            linker: /opt/aarch64-linux-musl-cross/bin/aarch64-linux-musl-gcc
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: latte-lens-macos-aarch64
            run_full_quality_gate: false
            run_native_e2e: true
            install_musl: false
            install_cross_musl: false
            linker: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: latte-lens-macos-x86_64
            run_full_quality_gate: false
            run_native_e2e: false
            install_musl: false
            install_cross_musl: false
            linker: ""
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: ${{ matrix.target == 'x86_64-unknown-linux-musl' && matrix.linker || '' }}
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-musl' && matrix.linker || '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl toolchain (native x86_64)
        if: matrix.install_musl
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
      - name: Install aarch64 musl cross-toolchain
        if: matrix.install_cross_musl
        run: |
          curl -fsSL https://musl.cc/aarch64-linux-musl-cross.tgz | sudo tar -xz -C /opt
          echo "/opt/aarch64-linux-musl-cross/bin" >> "$GITHUB_PATH"
      - name: Run the quality gate
        if: matrix.run_full_quality_gate
        run: make ci
      - name: Run the macOS TUI end-to-end check
        if: matrix.run_native_e2e
        run: make e2e
      - name: Build and verify the native package
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: make package-smoke
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  package-windows:
    name: Package (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check all targets with Cargo.lock
        run: cargo check --all-targets --all-features --locked
      - name: Run unit and integration tests
        run: cargo test --all-targets --all-features --locked
      - name: Build the Windows package
        shell: pwsh
        run: ./scripts/build-release.ps1
      - name: Verify the Windows package
        run: python scripts/verify-release-package.py "dist/*.zip" --binary latte-lens.exe
      - name: Test the PowerShell installer with the Windows package
        run: python -m unittest scripts/test_install_windows.py
      - uses: actions/upload-artifact@v7
        with:
          name: latte-lens-windows-${{ runner.arch }}
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [package-unix, package-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify the tag matches the package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag=${GITHUB_REF_NAME}
          version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)
          test -n "$version"

          if [[ "$tag" != "v$version" ]]; then
            echo "Release tag '$tag' must match Cargo.toml version 'v$version'." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true
      - name: Create release checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          cp install.sh install.ps1 dist/
          cd dist
          find . -maxdepth 1 -type f \
            \( -name '*.tar.gz' -o -name '*.zip' -o -name 'install.sh' -o -name 'install.ps1' \) -print0 \
            | LC_ALL=C sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt
      - name: Generate release notes and contributors
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          previous_tag=""
          release_tags=$(mktemp)
          gh api --paginate "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq '.[].tag_name' > "$release_tags"

          while IFS= read -r candidate; do
            [[ "$candidate" == "$TAG" ]] && continue
            if git rev-parse --verify "${candidate}^{commit}" >/dev/null 2>&1 \
              && git merge-base --is-ancestor "${candidate}^{commit}" "${TAG}^{commit}"; then
              previous_tag=$candidate
              break
            fi
          done < "$release_tags"

          scripts/generate-release-notes.sh "$TAG" RELEASE_NOTES.md "$previous_tag"
          cat RELEASE_NOTES.md
      - name: Create GitHub Release and upload packages
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$VERSION" == *-* ]]; then
            gh release create "$TAG" dist/* \
              --verify-tag \
              --notes-file RELEASE_NOTES.md \
              --prerelease \
              --title "Latte Lens $VERSION"
          else
            gh release create "$TAG" dist/* \
              --verify-tag \
              --notes-file RELEASE_NOTES.md \
              --title "Latte Lens $VERSION"
          fi
